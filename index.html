<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamIP – IPTV Player</title>
    <style>
        :root {
            --bg-color: #080b0d;
            --bg-deep: #050607;
            --card-bg: #12161a;
            --card-bg-soft: #171d22;
            --accent: #8b0000;
            --accent-hover: #b30000;
            --accent-soft: rgba(139, 0, 0, 0.18);
            --gold: #d2a84a;
            --gold-soft: rgba(210, 168, 74, 0.15);
            --text-main: #f5f7f8;
            --text-muted: #9aa7b3;
            --border: rgba(255,255,255,0.08);
            --border-soft: rgba(255,255,255,0.045);
            --shadow: 0 24px 70px rgba(0,0,0,0.55);
            --shadow-soft: 0 16px 38px rgba(0,0,0,0.42);
            --font-stack: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            min-height: 100vh;
            background:
                radial-gradient(900px 520px at 50% -180px, rgba(139, 0, 0, 0.24), transparent 62%),
                radial-gradient(780px 500px at 8% 12%, rgba(210, 168, 74, 0.08), transparent 64%),
                linear-gradient(180deg, var(--bg-color), var(--bg-deep) 115%);
            color: var(--text-main);
            font-family: var(--font-stack);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        body.rtl {
            direction: rtl;
            text-align: right;
        }

        body.rtl .cta-btn svg {
            margin-left: 10px;
            margin-right: 0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1.5rem;
            width: 100%;
        }

        header {
            padding: 1.35rem 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
        }

        .brand-logo {
            width: 48px;
            height: 48px;
            object-fit: contain;
            border-radius: 12px;
            box-shadow: 0 10px 28px rgba(0,0,0,0.45);
            border: 1px solid var(--border);
            background: #050607;
        }

        .brand-text {
            font-size: 1.35rem;
            font-weight: 850;
            letter-spacing: -0.035em;
            white-space: nowrap;
        }

        .lang-select {
            appearance: none;
            background:
                linear-gradient(180deg, rgba(255,255,255,0.055), rgba(255,255,255,0.025)),
                var(--card-bg);
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 0.62rem 2.15rem 0.62rem 0.95rem;
            border-radius: 999px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 10px 24px rgba(0,0,0,0.25);
            background-image:
                linear-gradient(45deg, transparent 50%, var(--gold) 50%),
                linear-gradient(135deg, var(--gold) 50%, transparent 50%),
                linear-gradient(180deg, rgba(255,255,255,0.055), rgba(255,255,255,0.025));
            background-position:
                calc(100% - 18px) 50%,
                calc(100% - 13px) 50%,
                0 0;
            background-size:
                5px 5px,
                5px 5px,
                100% 100%;
            background-repeat: no-repeat;
        }

        .hero {
            padding: 3rem 0 4.2rem 0;
            text-align: center;
        }

        .hero h1 {
            max-width: 920px;
            margin: 0 auto 1.25rem;
            font-size: clamp(2.55rem, 6vw, 4.65rem);
            font-weight: 900;
            letter-spacing: -0.055em;
            line-height: 0.98;
        }

        .hero-subtitle {
            font-size: clamp(1.08rem, 2.2vw, 1.35rem);
            color: var(--text-muted);
            max-width: 820px;
            margin: 0 auto 2.4rem auto;
            line-height: 1.62;
        }

        .banner-container {
            position: relative;
            max-width: 930px;
            margin: 0 auto 2.35rem auto;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255,255,255,0.11);
            background: #000;
        }

        .banner-container::before {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            border-radius: inherit;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.12);
            z-index: 2;
        }

        .banner-img {
            width: 100%;
            height: auto;
            display: block;
        }

        .hero-desc {
            font-size: 1.06rem;
            color: var(--text-muted);
            max-width: 780px;
            margin: 0 auto 2rem auto;
            opacity: 0.92;
            line-height: 1.72;
        }

        .price-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #f0cc73;
            background: linear-gradient(180deg, var(--gold-soft), rgba(210,168,74,0.07));
            border: 1px solid rgba(210,168,74,0.22);
            border-radius: 999px;
            padding: 0.42rem 0.9rem;
            font-size: 0.95rem;
            font-weight: 800;
            margin-bottom: 1rem;
            letter-spacing: 0.02em;
        }

        .cta-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .cta-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background:
                linear-gradient(180deg, var(--accent-hover), var(--accent));
            color: #fff;
            padding: 1rem 2.35rem;
            min-height: 54px;
            border-radius: 14px;
            text-decoration: none;
            font-weight: 850;
            letter-spacing: -0.01em;
            transition: transform 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
            box-shadow: 0 14px 34px rgba(139, 0, 0, 0.38);
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }

        .cta-btn:hover {
            background:
                linear-gradient(180deg, #c00000, var(--accent));
            box-shadow: 0 18px 42px rgba(139, 0, 0, 0.48);
            transform: translateY(-1px);
        }

        .cta-btn:active {
            transform: translateY(1px);
        }

        .cta-btn svg {
            margin-right: 10px;
            fill: currentColor;
            flex: 0 0 auto;
        }

        .section-title {
            font-size: clamp(1.55rem, 3vw, 2rem);
            font-weight: 850;
            margin-bottom: 1.35rem;
            text-align: center;
            letter-spacing: -0.035em;
            line-height: 1.15;
        }

        /* Showcase Seksjon */
        .showcase-section {
            padding: 2rem 0 4rem 0;
        }

        .carousel-group + .carousel-group {
            margin-top: 3.4rem;
        }

        .carousel-title {
            font-size: 1.16rem;
            color: var(--text-main);
            margin-bottom: 1rem;
            font-weight: 800;
            text-align: left;
            letter-spacing: -0.02em;
        }

        body.rtl .carousel-title {
            text-align: right;
        }

        .carousel-track {
            display: flex;
            gap: 1.25rem;
            overflow-x: auto;
            padding: 0.25rem 0.15rem 1.35rem;
            scrollbar-width: thin;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
        }

        .carousel-track::-webkit-scrollbar {
            height: 8px;
        }

        .carousel-track::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.035);
            border-radius: 999px;
        }

        .carousel-track::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.16);
            border-radius: 999px;
        }

        .carousel-item {
            scroll-snap-align: center;
            background:
                linear-gradient(180deg, rgba(255,255,255,0.055), rgba(255,255,255,0.018)),
                var(--card-bg);
            border: 1px solid var(--border-soft);
            box-shadow: var(--shadow-soft);
            overflow: hidden;
        }

        /* TV Format */
        .tv-track .carousel-item {
            flex: 0 0 calc(50% - 0.75rem);
            min-width: 310px;
            border-radius: 18px;
            padding: 8px;
        }

        .tv-track img {
            width: 100%;
            height: auto;
            border-radius: 13px;
            border: 1px solid rgba(255,255,255,0.07);
            display: block;
        }

        /* Mobil Format */
        .mobile-track .carousel-item {
            flex: 0 0 calc(25% - 1rem);
            min-width: 180px;
            border-radius: 22px;
            padding: 8px;
        }

        .mobile-track img {
            width: 100%;
            height: auto;
            border-radius: 17px;
            border: 1px solid rgba(255,255,255,0.07);
            display: block;
        }

        .grid-split {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-top: 3.4rem;
        }

        .info-box {
            position: relative;
            background:
                linear-gradient(180deg, rgba(255,255,255,0.045), rgba(255,255,255,0.018)),
                var(--card-bg);
            padding: 2.25rem;
            border-radius: 24px;
            border: 1px solid var(--border-soft);
            box-shadow: var(--shadow-soft);
            overflow: hidden;
        }

        .info-box::before {
            content: "";
            position: absolute;
            left: 0;
            right: 0;
            top: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(210,168,74,0.42), transparent);
        }

        ul {
            list-style: none;
            color: var(--text-muted);
        }

        li {
            position: relative;
            margin-bottom: 0.86rem;
            padding-left: 1.35rem;
            line-height: 1.58;
        }

        li::before {
            content: "";
            position: absolute;
            left: 0;
            top: 0.72em;
            width: 7px;
            height: 7px;
            border-radius: 999px;
            background: var(--gold);
            box-shadow: 0 0 0 4px rgba(210,168,74,0.1);
        }

        body.rtl li {
            padding-left: 0;
            padding-right: 1.35rem;
        }

        body.rtl li::before {
            left: auto;
            right: 0;
        }

        .disclaimer-box p {
            color: var(--text-muted);
            font-size: 0.98rem;
            margin-bottom: 1rem;
            line-height: 1.68;
        }

        .disclaimer-box p:last-child {
            margin-bottom: 0;
        }

        footer {
            padding: 4rem 0 3rem;
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.055);
            margin-top: 5rem;
        }

        footer p {
            color: var(--text-muted);
            font-weight: 650;
        }

        @media (max-width: 900px) {
            .container {
                padding: 0 1.05rem;
            }

            header {
                padding: 1rem 0 1.15rem;
                align-items: center;
            }

            .brand-logo {
                width: 44px;
                height: 44px;
                border-radius: 11px;
            }

            .brand-text {
                font-size: 1.18rem;
            }

            .lang-select {
                max-width: 145px;
                padding: 0.56rem 1.9rem 0.56rem 0.82rem;
                font-size: 0.88rem;
            }

            .hero {
                padding: 1.8rem 0 3.1rem 0;
            }

            .hero h1 {
                max-width: 9.8em;
                margin-bottom: 1rem;
                font-size: clamp(2.25rem, 12vw, 3.15rem);
                line-height: 0.98;
            }

            .hero-subtitle {
                max-width: 34rem;
                margin-bottom: 1.6rem;
                font-size: 1.04rem;
                line-height: 1.62;
            }

            .banner-container {
                width: calc(100% + 0.2rem);
                margin: 0 -0.1rem 1.65rem;
                border-radius: 18px;
                box-shadow: 0 18px 42px rgba(0,0,0,0.58);
            }

            .hero-desc {
                max-width: 34rem;
                margin-bottom: 1.55rem;
                font-size: 0.98rem;
                line-height: 1.68;
            }

            .price-badge {
                font-size: 0.9rem;
                margin-bottom: 0.9rem;
            }

            .cta-btn {
                width: 100%;
                max-width: 330px;
                min-height: 52px;
                padding: 0.95rem 1.15rem;
                border-radius: 14px;
            }

            .showcase-section {
                padding: 1.2rem 0 3rem 0;
            }

            .carousel-group + .carousel-group {
                margin-top: 2.5rem;
            }

            .carousel-title {
                text-align: center;
                margin-bottom: 0.95rem;
                font-size: 1.05rem;
            }

            body.rtl .carousel-title {
                text-align: center;
            }

            .carousel-track {
                gap: 0.9rem;
                padding: 0.2rem 0.05rem 1.15rem;
                scroll-padding-inline: 1rem;
            }

            .tv-track .carousel-item {
                flex: 0 0 88%;
                min-width: 0;
                border-radius: 17px;
                padding: 7px;
            }

            .tv-track img {
                border-radius: 12px;
            }

            .mobile-track .carousel-item {
                flex: 0 0 58%;
                min-width: 0;
                border-radius: 22px;
                padding: 8px;
            }

            .mobile-track img {
                border-radius: 17px;
            }

            .grid-split {
                grid-template-columns: 1fr;
                gap: 1rem;
                margin-top: 2.4rem;
            }

            .info-box {
                padding: 1.25rem;
                border-radius: 18px;
            }

            .info-box .section-title {
                margin-bottom: 1rem;
                text-align: start;
                font-size: 1.35rem;
            }

            li {
                font-size: 0.96rem;
                margin-bottom: 0.78rem;
            }

            .disclaimer-box p {
                font-size: 0.95rem;
            }

            footer {
                margin-top: 3.2rem;
                padding: 2.6rem 0 2.2rem;
            }
        }

        @media (max-width: 520px) {
            .container {
                padding: 0 0.95rem;
            }

            header {
                gap: 0.75rem;
            }

            .brand {
                gap: 9px;
            }

            .brand-logo {
                width: 40px;
                height: 40px;
            }

            .brand-text {
                font-size: 1.08rem;
            }

            .lang-select {
                max-width: 126px;
                font-size: 0.82rem;
                padding: 0.52rem 1.75rem 0.52rem 0.72rem;
            }

            .hero {
                padding-top: 1.45rem;
            }

            .hero h1 {
                max-width: 8.7em;
                font-size: clamp(2.05rem, 13vw, 2.75rem);
            }

            .hero-subtitle {
                font-size: 1rem;
                margin-bottom: 1.45rem;
            }

            .banner-container {
                border-radius: 16px;
            }

            .mobile-track .carousel-item {
                flex-basis: 72%;
            }

            .section-title {
                font-size: 1.35rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="brand">
                <img src="StreamIP-logo.jpg" class="brand-logo" alt="StreamIP Logo">
                <span class="brand-text">StreamIP</span>
            </div>
            <select class="lang-select" id="langSelect" onchange="changeLanguage(this.value)">
                <option value="en">English</option>
                <option value="no">Norsk</option>
                <option value="fr">Français</option>
                <option value="es">Español</option>
                <option value="pt">Português</option>
                <option value="ar">العربية</option>
            </select>
        </header>

        <section class="hero">
            <h1 id="heroTitle">StreamIP – IPTV-spiller</h1>
            <p class="hero-subtitle" id="heroSubtitle"></p>

            <div class="banner-container">
                <img src="StreamIP-butikk.png" class="banner-img" alt="StreamIP Showcase Banner">
            </div>

            <p class="hero-desc" id="heroDesc"></p>

            <div class="cta-container">
                <span class="price-badge" id="priceBadge"></span>
                <a href="https://play.google.com/store/apps/details?id=com.normannknot.streamip" class="cta-btn" target="_blank" rel="noopener">
                    <svg viewBox="0 0 24 24" width="24" height="24"><path d="M5 20h14v-2H5v2zm7-18L5.33 11h4V16h5.34v-5h4L12 2z"/></svg>
                    <span id="ctaText"></span>
                </a>
            </div>
        </section>

        <section class="showcase-section">
            <div class="carousel-group">
                <h3 class="carousel-title">Google TV & Tablet Layout</h3>
                <div class="carousel-track tv-track">
                    <div class="carousel-item"><img src="1000007632.png" alt="StreamIP Google TV skjermbilde"></div>
                    <div class="carousel-item"><img src="1000007626.png" alt="StreamIP Google TV skjermbilde"></div>
                    <div class="carousel-item"><img src="1000007635.png" alt="StreamIP Google TV skjermbilde"></div>
                    <div class="carousel-item"><img src="1000007641.png" alt="StreamIP Google TV skjermbilde"></div>
                    <div class="carousel-item"><img src="1000007621.png" alt="StreamIP Google TV skjermbilde"></div>
                    <div class="carousel-item"><img src="1000007638.png" alt="StreamIP Google TV skjermbilde"></div>
                </div>
            </div>

            <div class="carousel-group">
                <h3 class="carousel-title">Mobile Layout</h3>
                <div class="carousel-track mobile-track">
                    <div class="carousel-item"><img src="1000042347.png" alt="StreamIP mobilskjermbilde"></div>
                    <div class="carousel-item"><img src="1000042362.png" alt="StreamIP mobilskjermbilde"></div>
                    <div class="carousel-item"><img src="1000042353.png" alt="StreamIP mobilskjermbilde"></div>
                    <div class="carousel-item"><img src="1000042365.png" alt="StreamIP mobilskjermbilde"></div>
                    <div class="carousel-item"><img src="1000042344.png" alt="StreamIP mobilskjermbilde"></div>
                    <div class="carousel-item"><img src="1000042350.png" alt="StreamIP mobilskjermbilde"></div>
                    <div class="carousel-item"><img src="1000042356.png" alt="StreamIP mobilskjermbilde"></div>
                </div>
            </div>
        </section>

        <div class="grid-split">
            <div class="info-box">
                <h2 class="section-title" id="featuresTitle" style="text-align:start;"></h2>
                <ul id="featuresList"></ul>
            </div>
            <div class="info-box disclaimer-box">
                <h2 class="section-title" id="importantTitle" style="text-align:start;"></h2>
                <div id="disclaimerContent"></div>
            </div>
        </div>

        <footer>
            <p id="footerText"></p>
        </footer>
    </div>

    <script src="lang.js"></script>
    <script>
        function changeLanguage(lang) {
            const data = translations[lang] || translations['en'];

            if (data.dir === "rtl") {
                document.body.classList.add("rtl");
            } else {
                document.body.classList.remove("rtl");
            }

            document.documentElement.lang = lang;

            document.getElementById("heroTitle").innerText = data.title;
            document.getElementById("heroSubtitle").innerText = data.subtitle;
            document.getElementById("heroDesc").innerText = data.description + " " + data.langSupport;
            document.getElementById("priceBadge").innerText = data.priceTag || translations['en'].priceTag;
            document.getElementById("ctaText").innerText = data.ctaBtn;
            document.getElementById("featuresTitle").innerText = data.featuresTitle;
            document.getElementById("importantTitle").innerText = data.importantTitle;
            document.getElementById("footerText").innerText = data.footerText;

            const featuresList = document.getElementById("featuresList");
            featuresList.innerHTML = "";
            data.features.forEach(f => {
                const li = document.createElement("li");
                li.innerText = f;
                featuresList.appendChild(li);
            });

            const disclaimerContent = document.getElementById("disclaimerContent");
            disclaimerContent.innerHTML = "";
            data.disclaimers.forEach(d => {
                const p = document.createElement("p");
                p.innerText = d;
                disclaimerContent.appendChild(p);
            });
        }

        const userLang = navigator.language || navigator.userLanguage;
        const shortLang = userLang.split('-')[0];
        const defaultLang = translations[shortLang] ? shortLang : 'en';

        document.getElementById("langSelect").value = defaultLang;
        changeLanguage(defaultLang);
    </script>
</body>
</html>
